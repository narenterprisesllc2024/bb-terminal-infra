services:
  bb-terminal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bb-terminal
    restart: unless-stopped
    ports:
      - "5173"
      - "6900"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:5173/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
